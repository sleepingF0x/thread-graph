name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: threadgraph
          POSTGRES_PASSWORD: threadgraph
          POSTGRES_DB: threadgraph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://threadgraph:threadgraph@localhost:5432/threadgraph_test
      QDRANT_HOST: localhost
      QDRANT_PORT: "6333"
      ANTHROPIC_API_KEY: sk-test-placeholder
      EMBEDDING_BASE_URL: http://localhost:11434/v1
      EMBEDDING_API_KEY: placeholder
      EMBEDDING_MODEL: nomic-embed-text
      TELEGRAM_API_ID: "12345"
      TELEGRAM_API_HASH: placeholder

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Run tests
        run: uv run python -m pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
